<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Distribuição por Região - SmartVoz</title>
<style>
:root{
  --dark:#21004B;
  --purple:#5B18E8;
  --border:#E9DDF8;
  --muted:#5D6B82;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:#ffffff;
  font-family:Inter,Arial,sans-serif;
  color:var(--dark);
  padding:24px;
}
.smartvoz-region-card{
  width:min(1180px,100%);
  margin:auto;
  background:#ffffff;
  border:1px solid var(--border);
  border-radius:28px;
  padding:24px;
  box-shadow:0 18px 45px rgba(106,13,173,.10);
}
.region-toolbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  margin-bottom:18px;
}
.region-title h2{
  margin:0;
  font-size:30px;
  font-weight:950;
  color:var(--dark);
}
.region-title p{
  margin:6px 0 0;
  font-size:15px;
  color:var(--muted);
}
.region-select{ position:relative; z-index:20; }
.region-select-btn{
  height:48px;
  min-width:220px;
  border:1px solid #DDE3EA;
  border-radius:14px;
  background:#fff;
  padding:0 16px;
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:800;
  font-size:16px;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(0,0,0,.08);
}
.region-dot{
  width:16px;
  height:16px;
  border-radius:4px;
  background:#5B18E8;
}
.region-caret{ margin-left:auto; font-weight:900; }
.region-menu{
  display:none;
  position:absolute;
  top:56px;
  right:0;
  width:240px;
  background:#fff;
  border:1px solid #E5E7EB;
  border-radius:16px;
  box-shadow:0 14px 30px rgba(0,0,0,.16);
  overflow:hidden;
}
.region-select.open .region-menu{display:block}
.region-option{
  height:44px;
  padding:0 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  font-weight:700;
}
.region-option:hover,
.region-option.active{
  background:#F2F2F4;
  color:#8B22E6;
}
.infographic-area{
  position:relative;
  width:100%;
  background:#ffffff;
  border-radius:22px;
  overflow:hidden;
}
.infographic-img{
  width:100%;
  height:auto;
  display:block;
  background:#ffffff;
}
.hotspot{
  position:absolute;
  z-index:5;
  border-radius:50%;
  cursor:pointer;
  background:transparent;
}
.hotspot.active{
  outline:4px solid rgba(246,199,86,.65);
  box-shadow:0 0 26px rgba(246,199,86,.6);
}
.hs-norte    {left:29%;top:27%;width:14%;height:17%}
.hs-sudeste  {left:47%;top:20%;width:17%;height:20%}
.hs-centro   {left:29%;top:44%;width:15%;height:18%}
.hs-sul      {left:61%;top:33%;width:15%;height:27%}
.hs-nordeste {left:41%;top:62%;width:18%;height:15%}
.hs-outros   {left:58%;top:60%;width:19%;height:16%}

.region-tooltip{
  position:fixed;
  z-index:999;
  display:none;
  min-width:245px;
  background:#fff;
  border:1px solid #D9DEE7;
  border-radius:16px;
  padding:14px 16px;
  box-shadow:0 16px 34px rgba(0,0,0,.18);
  pointer-events:none;
}
.region-tooltip b{font-size:17px;color:#111}
.region-tooltip .big{
  font-size:25px;
  font-weight:950;
  margin:8px 0;
  color:#111;
}
.region-tooltip small{color:#667085}
.region-footer{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
  padding-top:16px;
  border-top:1px solid var(--border);
}
.region-pill{
  border:1px solid var(--border);
  border-radius:999px;
  background:#FAF7FF;
  padding:7px 12px;
  font-size:13px;
  font-weight:800;
  color:var(--dark);
}
@media(max-width:760px){
  body{padding:12px}
  .smartvoz-region-card{padding:16px;border-radius:22px}
  .region-toolbar{display:block}
  .region-title h2{font-size:24px}
  .region-select{margin-top:14px}
  .region-select-btn{width:100%}
  .region-menu{left:0;right:0;width:100%}
}
</style>
</head>
<body>
<div class="smartvoz-region-card">
  <div class="region-toolbar">
    <div class="region-title">
      <h2>Distribuição por Região</h2>
      <p>Ativações SmartVoz por região</p>
    </div>
    <div class="region-select" id="regionSelect">
      <button class="region-select-btn" id="regionSelectBtn" type="button">
        <span class="region-dot" id="regionDot"></span>
        <span id="regionLabel">Sudeste</span>
        <span class="region-caret">⌄</span>
      </button>
      <div class="region-menu" id="regionMenu"></div>
    </div>
  </div>

  <div class="infographic-area">
    <img class="infographic-img" src="/assets/distribuicao-regiao-3d.png" alt="Distribuição por Região - SmartVoz"/>
    <div class="hotspot hs-norte"    data-region="norte"></div>
    <div class="hotspot hs-sudeste"  data-region="sudeste"></div>
    <div class="hotspot hs-centro"   data-region="centro"></div>
    <div class="hotspot hs-sul"      data-region="sul"></div>
    <div class="hotspot hs-nordeste" data-region="nordeste"></div>
    <div class="hotspot hs-outros"   data-region="outros"></div>
  </div>

  <div class="region-footer">
    <span class="region-pill">Fundo branco</span>
    <span class="region-pill">Dropdown ativo</span>
    <span class="region-pill">Tooltip ativo</span>
    <span class="region-pill">Hotspots clicáveis</span>
    <span class="region-pill">Dados SmartVoz</span>
  </div>
</div>

<div class="region-tooltip" id="regionTooltip"></div>

<script>
const REGIONS = {
  norte:    { name:"Norte",        ativacoes:8,  color:"#A78BFA" },
  sudeste:  { name:"Sudeste",      ativacoes:14, color:"#C4B5FD" },
  centro:   { name:"Centro-Oeste", ativacoes:4,  color:"#F6C756" },
  sul:      { name:"Sul",          ativacoes:13, color:"#3FB8B0" },
  nordeste: { name:"Nordeste",     ativacoes:7,  color:"#7C9CF6" },
  outros:   { name:"Outros / Exterior", ativacoes:0, color:"#F4A6BD" },
};
const TOTAL = Object.values(REGIONS).reduce((s,r)=>s+r.ativacoes,0);

const sel = document.getElementById('regionSelect');
const btn = document.getElementById('regionSelectBtn');
const menu = document.getElementById('regionMenu');
const label = document.getElementById('regionLabel');
const dot = document.getElementById('regionDot');
const tooltip = document.getElementById('regionTooltip');
const hotspots = document.querySelectorAll('.hotspot');

let current = 'sudeste';

function buildMenu(){
  menu.innerHTML = '';
  Object.entries(REGIONS).forEach(([key,r])=>{
    const o = document.createElement('div');
    o.className = 'region-option' + (key===current?' active':'');
    o.dataset.region = key;
    o.innerHTML = `<span style="display:flex;align-items:center;gap:10px">
      <span class="region-dot" style="background:${r.color}"></span>${r.name}
    </span><span style="color:#8B22E6;font-weight:900">${r.ativacoes}</span>`;
    o.addEventListener('click',()=>{ setRegion(key); sel.classList.remove('open'); });
    menu.appendChild(o);
  });
}
function setRegion(key){
  current = key;
  const r = REGIONS[key];
  label.textContent = r.name;
  dot.style.background = r.color;
  hotspots.forEach(h=>h.classList.toggle('active', h.dataset.region===key));
  buildMenu();
}
btn.addEventListener('click',(e)=>{ e.stopPropagation(); sel.classList.toggle('open'); });
document.addEventListener('click',(e)=>{ if(!sel.contains(e.target)) sel.classList.remove('open'); });

function showTip(key,x,y){
  const r = REGIONS[key];
  const pct = TOTAL ? Math.round((r.ativacoes/TOTAL)*100) : 0;
  tooltip.innerHTML = `<b>${r.name}</b>
    <div class="big">${r.ativacoes} ativações</div>
    <small>${pct}% do total · ${TOTAL} no período</small>`;
  tooltip.style.display = 'block';
  const w = tooltip.offsetWidth, h = tooltip.offsetHeight;
  let left = x + 14, top = y + 14;
  if(left + w > window.innerWidth - 8) left = x - w - 14;
  if(top + h > window.innerHeight - 8) top = y - h - 14;
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}
function hideTip(){ tooltip.style.display='none'; }

hotspots.forEach(h=>{
  h.addEventListener('mousemove',(e)=>showTip(h.dataset.region,e.clientX,e.clientY));
  h.addEventListener('mouseleave',hideTip);
  h.addEventListener('click',()=>setRegion(h.dataset.region));
});

buildMenu();
setRegion(current);
</script>
</body>
</html>
